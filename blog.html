  <meta name="google-adsense-account" content="ca-pub-5355669932210627">
  <meta name="description" id="meta-desc" content="명리학, 오행, 로또 번호 생성, 반려동물 궁합에 관한 블로그입니다. 전통 동양 철학을 현대적으로 풀어드립니다.">

  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="dark">
  <div class="wrap">
    <div class="controls">
      <div class="nav-menu">
        <a href="index.html" class="nav-btn" id="nav-lotto">로또 번호 생성</a>
        <a href="pet-test.html" class="nav-btn" id="nav-pet">반려동물 궁합</a>
        <a href="blog.html" class="nav-btn active" id="nav-blog">블로그</a>
        <a href="about.html" class="nav-btn" id="nav-about">소개</a>
      </div>
      <div class="settings-group">
        <button class="control-btn" id="theme-toggle" onclick="toggleTheme()">☀️ Light Mode</button>
        <button class="control-btn" id="lang-toggle" onclick="toggleLanguage()">English</button>
      </div>
    </div>

    <div class="card">
      <h1 id="page-title">블로그</h1>
      <div id="page-content" class="main-content"></div>

    <footer>

        <a href="about.html" id="footer-about">소개</a> |

      </div>

    </footer>
  </div>

  <script src="i18n.js"></script>
  <script src="main.js"></script>
  <script>
    function updatePageUI() {
      const t = i18n[currentLang];
      document.getElementById("title-tag").textContent = t.blogTitle + " - " + t.lottoTitle;
      document.getElementById("page-title").textContent = t.blogTitle;
      document.getElementById("page-content").innerHTML = t.blogContent;

      const metaDesc = document.getElementById("meta-desc");
      const metaKeywords = document.getElementById("meta-keywords");
      if (currentLang === 'ko') {
        metaDesc.content = "명리학, 오행, 로또 번호 생성, 반려동물 궁합에 관한 블로그입니다. 전통 동양 철학을 현대적으로 풀어드립니다.";
        metaKeywords.content = "명리학, 오행, 로또, 반려동물 궁합, 사주, 목화토금수";
      } else {
        metaDesc.content = "A blog about Myeongli-hak, Five Elements, lotto number generation, and pet compatibility. Traditional Eastern philosophy made accessible.";
        metaKeywords.content = "Myeongli-hak, Five Elements, Lotto, Pet Compatibility, Saju, Wood Fire Earth Metal Water";
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById("footer-year").textContent = new Date().getFullYear();
      updatePageUI();
    });
  </script>

</html>

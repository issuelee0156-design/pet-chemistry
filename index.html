<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="title-tag">명리 로또 번호 추천기</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
      --card-bg: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-sub: #cbd5e1;
      --input-bg: rgba(255, 255, 255, 0.92);
      --input-text: #111827;
      --btn-bg: #facc15;
      --btn-text: #111827;
      --label-color: #e2e8f0;
      --analysis-bg: rgba(255, 255, 255, 0.06);
      --set-title-color: #fde68a;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    [data-theme="light"] {
      --bg-gradient: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #475569;
      --input-bg: #f8fafc;
      --input-text: #1e293b;
      --btn-bg: #2563eb;
      --btn-text: #ffffff;
      --label-color: #334155;
      --analysis-bg: #f1f5f9;
      --set-title-color: #1e40af;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 20px;
    }

    .control-btn {
      background: var(--card-bg);
      color: var(--text-main);
      border: 1px solid var(--text-sub);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .control-btn:hover {
      background: var(--text-sub);
      color: var(--bg-gradient);
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      text-align: center;
    }

    .sub {
      text-align: center;
      color: var(--text-sub);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: bold;
      color: var(--label-color);
    }

    input, .main-btn {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
    }

    input {
      background: var(--input-bg);
      color: var(--input-text);
      border: 1px solid #cbd5e1;
    }

    .main-btn {
      width: 100%;
      margin-top: 10px;
      background: var(--btn-bg);
      color: var(--btn-text);
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .main-btn:hover {
      transform: translateY(-2px);
    }

    .analysis {
      margin-top: 24px;
      background: var(--analysis-bg);
      border-radius: 18px;
      padding: 18px;
      line-height: 1.7;
      color: var(--text-main);
    }

    .result-area {
      margin-top: 24px;
      display: grid;
      gap: 18px;
    }

    .set-card {
      background: var(--analysis-bg);
      border-radius: 18px;
      padding: 18px;
    }

    .set-title {
      font-weight: bold;
      margin-bottom: 12px;
      color: var(--set-title-color);
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .ball {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      color: #fff;
      box-shadow: 0 8px 16px rgba(0,0,0,0.25);
    }

    .bonus {
      background: #111827 !important;
      border: 2px solid #fff;
    }

    .plus {
      font-size: 22px;
      font-weight: bold;
      color: var(--text-main);
      margin: 0 4px;
    }

    .color1 { background: #f59e0b; }
    .color2 { background: #3b82f6; }
    .color3 { background: #ef4444; }
    .color4 { background: #22c55e; }
    .color5 { background: #8b5cf6; }

    .footer-note {
      margin-top: 18px;
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 28px;
      }

      .ball {
        width: 48px;
        height: 48px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="wrap">
    <div class="controls">
      <button class="control-btn" id="lang-toggle" onclick="toggleLanguage()">English</button>
      <button class="control-btn" id="theme-toggle" onclick="toggleTheme()">☀️ Light Mode</button>
    </div>
    <div class="card">
      <h1 id="title">명리 로또 번호 추천기</h1>
      <div class="sub" id="subtitle">
        이름, 생년월일, 날짜를 입력하면<br>
        그날의 기운을 반영한 명리학 감성 로또 번호 5세트를 추천합니다.
      </div>

      <div class="grid">
        <div class="field full">
          <label for="username" id="label-name">이름</label>
          <input type="text" id="username" placeholder="이름을 입력하세요" />
        </div>

        <div class="field">
          <label for="birthdate" id="label-birth">생년월일</label>
          <input type="date" id="birthdate" />
        </div>

        <div class="field">
          <label for="targetDate" id="label-date">운세를 볼 날짜</label>
          <input type="date" id="targetDate" />
        </div>
      </div>

      <button class="main-btn" id="generate-btn" onclick="generateFortuneLotto()">이름 반영 로또 번호 추천받기</button>

      <div id="analysis" class="analysis" style="display:none;"></div>
      <div id="resultArea" class="result-area"></div>

      <div class="contact-section" style="margin-top: 40px; border-top: 1px solid var(--analysis-bg); padding-top: 24px;">
        <h2 id="contact-title" style="font-size: 22px; margin-bottom: 16px;">제휴 문의</h2>
        <form action="https://formspree.io/f/xdaylvkg" method="POST" style="display: grid; gap: 12px;">
          <div class="field">
            <label for="contact-name" id="label-contact-name">이름/기업명</label>
            <input type="text" name="name" id="contact-name" required />
          </div>
          <div class="field">
            <label for="contact-email" id="label-contact-email">이메일</label>
            <input type="email" name="_replyto" id="contact-email" required />
          </div>
          <div class="field">
            <label for="contact-message" id="label-contact-message">문의 내용</label>
            <textarea name="message" id="contact-message" style="width: 100%; height: 100px; border-radius: 14px; padding: 14px 16px; font-size: 16px; background: var(--input-bg); color: var(--input-text); border: 1px solid #cbd5e1; font-family: inherit; resize: none;" required></textarea>
          </div>
          <button type="submit" class="main-btn" id="contact-submit-btn" style="background: var(--text-sub); color: var(--bg-gradient); margin-top: 5px;">문의 보내기</button>
        </form>
      </div>

      <div class="footer-note" id="footer-text">
        이 페이지는 이름과 날짜를 숫자 흐름으로 변환해 명리학적 분위기를 더한 번호 추천 도구다.
        실제 당첨 예측기가 아니라 재미와 개인화 요소를 결합한 형태로 보면 된다.
      </div>
    </div>
  </div>

  <script>
    const i18n = {
      ko: {
        title: "명리 로또 번호 추천기",
        subtitle: "이름, 생년월일, 날짜를 입력하면<br>그날의 기운을 반영한 명리학 감성 로또 번호 5세트를 추천합니다.",
        labelName: "이름",
        namePlaceholder: "이름을 입력하세요",
        labelBirth: "생년월일",
        labelDate: "운세를 볼 날짜",
        generateBtn: "이름 반영 로또 번호 추천받기",
        footer: "이 페이지는 이름과 날짜를 숫자 흐름으로 변환해 명리학적 분위기를 더한 번호 추천 도구다. 실제 당첨 예측기가 아니라 재미와 개인화 요소를 결합한 형태로 보면 된다.",
        alertInput: "이름, 생년월일, 날짜를 모두 입력해 주세요.",
        setSuffix: "번 추천 세트",
        analysisTitle: "명리 해석 요약",
        analysisResult1: "이름 <strong>{name}</strong> 의 수리값 합은 <strong>{total}</strong>, 글자 수는 <strong>{length}</strong>로 반영되었다.",
        analysisResult2: "선택한 날짜 기준 오행 흐름은 목({wood}) · 화({fire}) · 토({earth}) · 금({metal}) · 수({water}) 로 계산되었다.",
        analysisResult3: "오늘의 중심 기운은 <strong>{element}</strong>이며, {text}",
        wood: "목", fire: "화", earth: "토", metal: "금", water: "수",
        woodText: "성장과 확장의 기운이 강하다. 새로운 선택과 넓혀가는 흐름이 강조되는 날이다.",
        fireText: "활동성과 추진력이 살아난다. 빠른 판단과 강한 실행력이 잘 맞는 흐름이다.",
        earthText: "균형과 안정의 기운이 중심이다. 무리한 승부보다 중심을 잡는 감각이 중요하다.",
        metalText: "정리와 선별의 기운이 강하다. 숫자를 압축하고 집중하는 흐름이 어울린다.",
        waterText: "직관과 유연함의 기운이 강하다. 감각적으로 흐름을 읽는 방향이 잘 맞는다."
      },
      en: {
        title: "Myeongli Powerball Generator",
        subtitle: "Enter your name and dates to get 5 sets of Powerball numbers<br>based on Myeongli-hak (Asian astrology) fortune vibes.",
        labelName: "Name",
        namePlaceholder: "Enter your name",
        labelBirth: "Birth Date",
        labelDate: "Fortune Date",
        generateBtn: "Get Personalized Powerball Numbers",
        footer: "This page is a fun tool that converts names and dates into number flows with a Myeongli-hak vibe. It uses US Powerball rules (5/69 + 1/26) for English mode.",
        alertInput: "Please enter your name, birth date, and target date.",
        setSuffix: "Recommended Set #",
        analysisTitle: "Interpretation Summary",
        analysisResult1: "The numerical sum for <strong>{name}</strong> is <strong>{total}</strong>, with a length of <strong>{length}</strong>.",
        analysisResult2: "Five Element scores for the selected date: Wood({wood}) · Fire({fire}) · Earth({earth}) · Metal({metal}) · Water({water}).",
        analysisResult3: "The central energy is <strong>{element}</strong>: {text}",
        wood: "Wood", fire: "Fire", earth: "Earth", metal: "Metal", water: "Water",
        woodText: "Strong energy of growth and expansion. A day to embrace new choices and broad horizons.",
        fireText: "High activity and drive. Quick judgment and strong execution are favored.",
        earthText: "Energy of balance and stability. Focusing on stability is more important than taking risks.",
        metalText: "Strong energy of refinement and selection. Suitable for focusing and narrowing down numbers.",
        waterText: "Strong energy of intuition and flexibility. Trusting your gut feeling works best today."
      }
    };

    let currentLang = 'ko';

    function toggleLanguage() {
      currentLang = currentLang === 'ko' ? 'en' : 'ko';
      const btn = document.getElementById("lang-toggle");
      btn.textContent = currentLang === 'ko' ? 'English' : '한국어';
      updateUI();
    }

    function updateUI() {
      const t = i18n[currentLang];
      document.getElementById("title-tag").textContent = t.title;
      document.getElementById("title").textContent = t.title;
      document.getElementById("subtitle").innerHTML = t.subtitle;
      document.getElementById("label-name").textContent = t.labelName;
      document.getElementById("username").placeholder = t.namePlaceholder;
      document.getElementById("label-birth").textContent = t.labelBirth;
      document.getElementById("label-date").textContent = t.labelDate;
      document.getElementById("generate-btn").textContent = t.generateBtn;
      document.getElementById("footer-text").textContent = t.footer;
      
      document.getElementById("analysis").style.display = "none";
      document.getElementById("resultArea").innerHTML = "";
    }

    function toggleTheme() {
      const body = document.body;
      const btn = document.getElementById("theme-toggle");
      if (body.getAttribute("data-theme") === "dark") {
        body.setAttribute("data-theme", "light");
        btn.textContent = "🌙 Dark Mode";
      } else {
        body.setAttribute("data-theme", "dark");
        btn.textContent = "☀️ Light Mode";
      }
    }

    function getBallColor(number, isPowerball = false) {
      if (isPowerball) return "color3"; // Powerball is usually red-ish
      if (number <= 15) return "color1";
      if (number <= 30) return "color2";
      if (number <= 45) return "color3";
      if (number <= 55) return "color4";
      return "color5";
    }

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function seededRandom(seed) {
      let x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }

    function getNameValue(name) {
      let total = 0;
      let chars = [];

      for (let i = 0; i < name.length; i++) {
        const code = name.charCodeAt(i);
        const value = (code % 45) + 1;
        total += value;
        chars.push(value);
      }

      return {
        total,
        chars,
        length: name.length
      };
    }

    function getElementScores(year, month, day, targetYear, targetMonth, targetDay, nameValue) {
      const wood = ((year % 10) + month + (targetMonth * 2) + (nameValue.total % 7)) % 9 + 1;
      const fire = ((day % 10) + targetDay + Math.floor(targetYear / 100) + (nameValue.length * 2)) % 9 + 1;
      const earth = ((month + day + targetMonth + targetDay + (nameValue.total % 9))) % 9 + 1;
      const metal = ((Math.floor(year / 10) + Math.floor(targetYear / 10) + month + (nameValue.total % 5))) % 9 + 1;
      const water = ((year + day + targetYear + targetDay + (nameValue.total % 11))) % 9 + 1;

      return { wood, fire, earth, metal, water };
    }

    function getStrongElementKey(scores) {
      const entries = [
        ["wood", scores.wood],
        ["fire", scores.fire],
        ["earth", scores.earth],
        ["metal", scores.metal],
        ["water", scores.water]
      ];

      entries.sort((a, b) => b[1] - a[1]);
      return entries[0][0];
    }

    function getLuckyNumberBases(scores, y, m, d, ty, tm, td, nameValue, range) {
      const total = y + m + d + ty + tm + td + nameValue.total;
      const nameMain = nameValue.total % range || range;
      const nameSub = (nameValue.chars.reduce((a, b) => a + b, 0) * nameValue.length) % range || range;

      const bases = [];
      bases.push((scores.wood * 3 + nameMain) % range || range);
      bases.push((scores.fire * 5 + nameSub) % range || range);
      bases.push((scores.earth * 7 + nameValue.length) % range || range);
      bases.push((scores.metal * 9 + nameMain + nameValue.length) % range || range);
      bases.push((scores.water * 11 + nameSub) % range || range);
      bases.push((total % range) || range);

      return [...new Set(bases)];
    }

    function createFortuneSeed(y, m, d, ty, tm, td, setIndex, nameValue) {
      return (
        y * 1000003 +
        m * 10007 +
        d * 101 +
        ty * 97 +
        tm * 31 +
        td * 13 +
        setIndex * 7919 +
        nameValue.total * 181 +
        nameValue.length * 59
      );
    }

    function createFortuneSet(y, m, d, ty, tm, td, scores, setIndex, nameValue) {
      const isPowerballMode = currentLang === 'en';
      const mainRange = isPowerballMode ? 69 : 45;
      const bonusRange = isPowerballMode ? 26 : 45;
      const mainCount = isPowerballMode ? 5 : 6;

      const luckyBases = getLuckyNumberBases(scores, y, m, d, ty, tm, td, nameValue, mainRange);
      const numbersSet = new Set();

      luckyBases.forEach((num, idx) => {
        if (numbersSet.size < 2) {
          let adjusted = ((num + setIndex * (idx + 2) + nameValue.length) % mainRange);
          adjusted = adjusted === 0 ? mainRange : adjusted;
          numbersSet.add(adjusted);
        }
      });

      let seed = createFortuneSeed(y, m, d, ty, tm, td, setIndex, nameValue);

      while (numbersSet.size < mainCount) {
        seed += 17;
        let num = Math.floor(seededRandom(seed) * mainRange) + 1;
        numbersSet.add(num);
      }

      const numbers = [...numbersSet].sort((a, b) => a - b);

      let bonus;
      do {
        seed += 29;
        bonus = Math.floor(seededRandom(seed) * bonusRange) + 1;
      } while (!isPowerballMode && numbers.includes(bonus));

      return { numbers, bonus, isPowerballMode };
    }

    function generateFortuneLotto() {
      const username = document.getElementById("username").value.trim();
      const birthdate = document.getElementById("birthdate").value;
      const targetDate = document.getElementById("targetDate").value;
      const resultArea = document.getElementById("resultArea");
      const analysis = document.getElementById("analysis");
      const t = i18n[currentLang];

      if (!username || !birthdate || !targetDate) {
        alert(t.alertInput);
        return;
      }

      const [y, m, d] = birthdate.split("-").map(Number);
      const [ty, tm, td] = targetDate.split("-").map(Number);

      const nameValue = getNameValue(username);
      const scores = getElementScores(y, m, d, ty, tm, td, nameValue);
      const elementKey = getStrongElementKey(scores);
      const fortuneText = t[elementKey + "Text"];
      const elementName = t[elementKey];

      analysis.style.display = "block";
      analysis.innerHTML = `
        <strong>${t.analysisTitle}</strong><br>
        ${t.analysisResult1.replace("{name}", username).replace("{total}", nameValue.total).replace("{length}", nameValue.length)}<br>
        ${t.analysisResult2.replace("{wood}", scores.wood).replace("{fire}", scores.fire).replace("{earth}", scores.earth).replace("{metal}", scores.metal).replace("{water}", scores.water)}<br>
        ${t.analysisResult3.replace("{element}", elementName).replace("{text}", fortuneText)}
      `;

      resultArea.innerHTML = "";

      for (let i = 1; i <= 5; i++) {
        const set = createFortuneSet(y, m, d, ty, tm, td, scores, i, nameValue);

        const card = document.createElement("div");
        card.className = "set-card";

        const title = document.createElement("div");
        title.className = "set-title";
        title.textContent = currentLang === 'ko' ? `${i}${t.setSuffix}` : `${t.setSuffix}${i}`;

        const numbersDiv = document.createElement("div");
        numbersDiv.className = "numbers";

        set.numbers.forEach(num => {
          const ball = document.createElement("div");
          ball.className = `ball ${getBallColor(num)}`;
          ball.textContent = num;
          numbersDiv.appendChild(ball);
        });

        const plus = document.createElement("div");
        plus.className = "plus";
        plus.textContent = "+";

        const bonusBall = document.createElement("div");
        bonusBall.className = `ball bonus ${set.isPowerballMode ? 'powerball' : ''}`;
        bonusBall.textContent = set.bonus;
        if (set.isPowerballMode) {
          bonusBall.style.background = "#ef4444"; // Powerball typical color
        }

        numbersDiv.appendChild(plus);
        numbersDiv.appendChild(bonusBall);

        card.appendChild(title);
        card.appendChild(numbersDiv);
        resultArea.appendChild(card);
      }
    }

    window.onload = function () {
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;
      document.getElementById("targetDate").value = todayStr;
      updateUI();
    };
  </script>
</body>
</html>

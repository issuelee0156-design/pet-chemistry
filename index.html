<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-5355669932210627">
  <meta name="description" id="meta-desc" content="이름, 생년월일, 날짜를 입력하면 그날의 기운을 반영한 명리학 감성 로또 번호를 추천해드립니다.">
  <meta name="keywords" id="meta-keywords" content="로또 번호 추천, 명리학, 사주 로또, 오늘 운세, 행운의 숫자, 파워볼">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5355669932210627" crossorigin="anonymous"></script>
  <title id="title-tag">명리 로또 번호 추천기</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 18px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field.full {
      grid-column: 1 / -1;
    }
    label {
      font-weight: bold;
      color: var(--label-color);
    }
    input, .main-btn {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
    }
    input {
      background: var(--input-bg);
      color: var(--input-text);
      border: 1px solid #cbd5e1;
    }
    .main-btn {
      width: 100%;
      margin-top: 10px;
      background: var(--btn-bg);
      color: var(--btn-text);
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .main-btn:hover {
      transform: translateY(-2px);
    }
    .analysis {
      margin-top: 24px;
      background: var(--analysis-bg);
      border-radius: 18px;
      padding: 18px;
      line-height: 1.7;
      color: var(--text-main);
    }
    .result-area {
      margin-top: 24px;
      display: grid;
      gap: 18px;
    }
    .set-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .set-title {
      font-weight: bold;
      margin-bottom: 12px;
      color: var(--set-title-color);
    }
    .numbers {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .ball {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #fff;
      font-size: 16px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .ball.color1 { background: #facc15; color: #111827; }
    .ball.color2 { background: #3b82f6; }
    .ball.color3 { background: #ef4444; }
    .ball.color4 { background: #6b7280; }
    .ball.color5 { background: #22c55e; }
    .ball.bonus { border: 3px solid #fff; }
    .plus { font-weight: bold; font-size: 20px; color: var(--text-sub); }
  </style>
</head>
<body data-theme="dark">
  <div class="wrap">
    <div class="controls">
      <div class="nav-menu">
        <a href="index.html" class="nav-btn active" id="nav-lotto">로또 번호 생성</a>
        <a href="pet-test.html" class="nav-btn" id="nav-pet">반려동물 궁합</a>
        <a href="about.html" class="nav-btn" id="nav-about">소개</a>
      </div>
      <div class="settings-group">
        <button class="control-btn" id="theme-toggle" onclick="toggleTheme()">☀️ Light Mode</button>
        <button class="control-btn" id="lang-toggle" onclick="toggleLanguage()">English</button>
      </div>
    </div>

    <div class="card">
      <h1 id="title">명리 로또 번호 추천기</h1>
      <div class="sub" id="subtitle">이름, 생년월일, 날짜를 입력하면<br>그날의 기운을 반영한 명리학 감성 로또 번호 5세트를 추천합니다.</div>

      <div class="grid">
        <div class="field full">
          <label for="username" id="label-name">이름</label>
          <input type="text" id="username" placeholder="이름을 입력하세요" />
        </div>

        <div class="field">
          <label for="birthdate" id="label-birth">생년월일</label>
          <input type="date" id="birthdate" />
        </div>

        <div class="field">
          <label for="targetDate" id="label-date">운세를 볼 날짜</label>
          <input type="date" id="targetDate" />
        </div>
      </div>

      <button class="main-btn" id="generate-btn" onclick="generateFortuneLotto()">이름 반영 로또 번호 추천받기</button>

      <div id="analysis" class="analysis" style="display:none;"></div>
      <div id="resultArea" class="result-area"></div>

      <div class="contact-section" style="margin-top: 40px; border-top: 1px solid var(--analysis-bg); padding-top: 24px;">
        <h2 id="contact-title" style="font-size: 22px; margin-bottom: 16px;">제휴 문의</h2>
        <form action="https://formspree.io/f/xdaylvkg" method="POST" style="display: grid; gap: 12px;">
          <div class="field">
            <label for="contact-name" id="label-contact-name">이름/기업명</label>
            <input type="text" name="name" id="contact-name" required />
          </div>
          <div class="field">
            <label for="contact-email" id="label-contact-email">이메일</label>
            <input type="email" name="_replyto" id="contact-email" required />
          </div>
          <div class="field">
            <label for="contact-message" id="label-contact-message">문의 내용</label>
            <textarea name="message" id="contact-message" oninput="handleContactInput()" style="width: 100%; height: 100px; border-radius: 14px; padding: 14px 16px; font-size: 16px; background: var(--input-bg); color: var(--input-text); border: 1px solid #cbd5e1; font-family: inherit; resize: none;" required></textarea>
          </div>
          <button type="submit" class="main-btn" id="contact-submit-btn" style="background: var(--text-sub); color: var(--bg-gradient); margin-top: 5px; transition: all 0.3s ease;">문의 보내기</button>
        </form>
      </div>

      <div class="footer-note" id="footer-text" style="margin-top: 20px; font-size: 14px; color: var(--text-sub); text-align: center;">
        <!-- Footer text will be injected -->
      </div>
    </div>

    <div id="seo-content" class="seo-section">
      <!-- SEO content will be injected -->
    </div>

    <footer>
      <div class="footer-links">
        <a href="about.html" id="footer-about">소개</a> | 
        <a href="terms.html" id="footer-terms">이용약관</a> | 
        <a href="privacy.html" id="footer-privacy">개인정보처리방침</a> | 
        <a href="#contact-title" id="footer-contact">제휴문의</a>
      </div>
      <p>© 2024 명리 로또 & 반려동물 궁합. All rights reserved.</p>
    </footer>
  </div>

  <script src="i18n.js"></script>
  <script src="main.js"></script>
  <script>
    function updatePageUI() {
      const t = i18n[currentLang];
      document.getElementById("title-tag").textContent = t.lottoTitle;
      document.getElementById("title").textContent = t.lottoTitle;
      document.getElementById("subtitle").innerHTML = t.lottoSubtitle;
      document.getElementById("label-name").textContent = t.labelName;
      document.getElementById("username").placeholder = t.namePlaceholder;
      document.getElementById("label-birth").textContent = t.labelBirth;
      document.getElementById("label-date").textContent = t.labelDate;
      document.getElementById("generate-btn").textContent = t.generateBtn;
      document.getElementById("footer-text").textContent = t.lottoFooter;
      
      // Contact form
      document.getElementById("contact-title").textContent = t.navContact;
      document.getElementById("label-contact-name").textContent = t.labelContactName;
      document.getElementById("label-contact-email").textContent = t.labelContactEmail;
      document.getElementById("label-contact-message").textContent = t.labelContactMessage;
      document.getElementById("contact-submit-btn").textContent = t.contactSubmit;

      // SEO
      document.getElementById("seo-content").innerHTML = t.seoLottoText;

      const metaDesc = document.getElementById("meta-desc");
      const metaKeywords = document.getElementById("meta-keywords");
      if (currentLang === 'ko') {
        metaDesc.content = "이름, 생년월일, 날짜를 입력하면 그날의 기운을 반영한 명리학 감성 로또 번호를 추천해드립니다.";
        metaKeywords.content = "로또 번호 추천, 명리학, 사주 로또, 오늘 운세, 행운의 숫자, 파워볼";
      } else {
        metaDesc.content = "Get 5 sets of Powerball numbers based on Myeongli-hak vibes by entering your name and dates.";
        metaKeywords.content = "Lotto generator, Powerball, Myeongli-hak, Saju, Fortune numbers, Lucky numbers";
      }

      document.getElementById("analysis").style.display = "none";
      document.getElementById("resultArea").innerHTML = "";
      handleContactInput();
    }

    function handleContactInput() {
      const message = document.getElementById("contact-message").value.trim();
      const btn = document.getElementById("contact-submit-btn");
      if (!btn) return;
      if (message.length > 0) {
        btn.style.background = "var(--btn-bg)";
        btn.style.color = "var(--btn-text)";
      } else {
        btn.style.background = "var(--text-sub)";
        btn.style.color = "var(--bg-gradient)";
      }
    }

    function getBallColor(number, isPowerball = false) {
      if (isPowerball) return "color3";
      if (number <= 15) return "color1";
      if (number <= 30) return "color2";
      if (number <= 45) return "color3";
      if (number <= 55) return "color4";
      return "color5";
    }

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function seededRandom(seed) {
      let x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }

    function getNameValue(name) {
      let total = 0;
      let chars = [];
      for (let i = 0; i < name.length; i++) {
        const code = name.charCodeAt(i);
        const value = (code % 45) + 1;
        total += value;
        chars.push(value);
      }
      return { total, chars, length: name.length };
    }

    function getElementScores(y, m, d, ty, tm, td, nameValue) {
      const seed = y + m + d + ty + tm + td + nameValue.total;
      return {
        wood: Math.floor(seededRandom(seed) * 30) + 10,
        fire: Math.floor(seededRandom(seed + 1) * 30) + 10,
        earth: Math.floor(seededRandom(seed + 2) * 30) + 10,
        metal: Math.floor(seededRandom(seed + 3) * 30) + 10,
        water: Math.floor(seededRandom(seed + 4) * 30) + 10
      };
    }

    function getStrongElementKey(scores) {
      let max = -1;
      let key = "earth";
      for (let k in scores) {
        if (scores[k] > max) {
          max = scores[k];
          key = k;
        }
      }
      return key;
    }

    function createFortuneSet(y, m, d, ty, tm, td, scores, setNum, nameValue) {
      const baseSeed = y * m * d + ty * tm + td + nameValue.total + setNum * 100;
      let numbers = [];
      const isPowerballMode = (currentLang === 'en');
      const maxNum = isPowerballMode ? 69 : 45;
      const bonusMax = isPowerballMode ? 26 : 45;

      for (let i = 0; i < 6; i++) {
        let n;
        let count = 0;
        do {
          const s = baseSeed + i * 10 + count;
          n = Math.floor(seededRandom(s) * maxNum) + 1;
          count++;
        } while (numbers.includes(n));
        numbers.push(n);
      }

      const mainNumbers = numbers.slice(0, 5).sort((a, b) => a - b);
      const bonus = Math.floor(seededRandom(baseSeed + 99) * bonusMax) + 1;

      return { numbers: mainNumbers, bonus, isPowerballMode };
    }

    function generateFortuneLotto() {
      const username = document.getElementById("username").value.trim();
      const birthdate = document.getElementById("birthdate").value;
      const targetDate = document.getElementById("targetDate").value;
      const t = i18n[currentLang];
      const analysis = document.getElementById("analysis");
      const resultArea = document.getElementById("resultArea");

      if (!username || !birthdate || !targetDate) {
        alert(t.alertInput);
        return;
      }

      const [y, m, d] = birthdate.split("-").map(Number);
      const [ty, tm, td] = targetDate.split("-").map(Number);
      const nameValue = getNameValue(username);
      const scores = getElementScores(y, m, d, ty, tm, td, nameValue);
      const elementKey = getStrongElementKey(scores);
      const fortuneText = t[elementKey + "Text"];
      const elementName = t[elementKey];

      analysis.style.display = "block";
      analysis.innerHTML = `
        <strong>${t.analysisTitle}</strong><br>
        ${t.analysisResult1.replace("{name}", username).replace("{total}", nameValue.total).replace("{length}", nameValue.length)}<br>
        ${t.analysisResult2.replace("{wood}", scores.wood).replace("{fire}", scores.fire).replace("{earth}", scores.earth).replace("{metal}", scores.metal).replace("{water}", scores.water)}<br>
        ${t.analysisResult3.replace("{element}", elementName).replace("{text}", fortuneText)}
      `;

      resultArea.innerHTML = "";
      for (let i = 1; i <= 5; i++) {
        const set = createFortuneSet(y, m, d, ty, tm, td, scores, i, nameValue);
        const card = document.createElement("div");
        card.className = "set-card";
        const title = document.createElement("div");
        title.className = "set-title";
        title.textContent = currentLang === 'ko' ? `${i}${t.setSuffix}` : `${t.setSuffix}${i}`;
        const numbersDiv = document.createElement("div");
        numbersDiv.className = "numbers";
        set.numbers.forEach(num => {
          const ball = document.createElement("div");
          ball.className = `ball ${getBallColor(num)}`;
          ball.textContent = num;
          numbersDiv.appendChild(ball);
        });
        const plus = document.createElement("div");
        plus.className = "plus";
        plus.textContent = "+";
        const bonusBall = document.createElement("div");
        bonusBall.className = `ball bonus ${set.isPowerballMode ? 'powerball' : ''}`;
        bonusBall.textContent = set.bonus;
        if (set.isPowerballMode) bonusBall.style.background = "#ef4444";
        numbersDiv.appendChild(plus);
        numbersDiv.appendChild(bonusBall);
        card.appendChild(title);
        card.appendChild(numbersDiv);
        resultArea.appendChild(card);
      }
    }

    window.onload = function () {
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;
      document.getElementById("targetDate").value = todayStr;
      updatePageUI();
    };
  </script>
</body>
</html>

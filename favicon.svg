<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </radialGradient>
    <radialGradient id="gold" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Toe pads -->
  <ellipse cx="30" cy="36" rx="9.5" ry="8" fill="url(#gold)"/>
  <ellipse cx="50" cy="30" rx="10.5" ry="9" fill="url(#gold)"/>
  <ellipse cx="70" cy="36" rx="9.5" ry="8" fill="url(#gold)"/>

  <!-- Main pad -->
  <ellipse cx="50" cy="62" rx="20" ry="17" fill="url(#gold)"/>

  <!-- Sparkle top-right -->
  <g transform="translate(78,18)">
    <polygon points="0,-7 1.5,-1.5 7,0 1.5,1.5 0,7 -1.5,1.5 -7,0 -1.5,-1.5"
             fill="#fde68a" opacity="0.95"/>
  </g>

  <!-- Tiny sparkle -->
  <g transform="translate(86,34)">
    <polygon points="0,-4 0.9,-0.9 4,0 0.9,0.9 0,4 -0.9,0.9 -4,0 -0.9,-0.9"
             fill="#fde68a" opacity="0.6"/>
  </g>
</svg>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="title-tag">반려동물 궁합 테스트 - Pet Match</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
      --card-bg: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-sub: #cbd5e1;
      --btn-bg: #facc15;
      --btn-text: #111827;
      --analysis-bg: rgba(255, 255, 255, 0.06);
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    [data-theme="light"] {
      --bg-gradient: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #475569;
      --btn-bg: #2563eb;
      --btn-text: #ffffff;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      transition: all 0.3s;
    }

    .wrap { max-width: 800px; margin: 0 auto; padding: 24px; }
    .controls { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; }
    .control-btn {
      background: var(--card-bg); color: var(--text-main); border: 1px solid var(--text-sub);
      padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 14px;
    }

    .card {
      background: var(--card-bg); border-radius: 24px; padding: 32px;
      box-shadow: var(--shadow); backdrop-filter: blur(10px); text-align: center;
    }

    h1 { font-size: 32px; margin-bottom: 10px; }
    .sub { color: var(--text-sub); margin-bottom: 30px; line-height: 1.6; }

    .upload-area {
      border: 3px dashed var(--text-sub); border-radius: 20px; padding: 40px;
      cursor: pointer; transition: all 0.2s; position: relative; margin-bottom: 24px;
    }
    .upload-area:hover { border-color: var(--btn-bg); background: rgba(255,255,255,0.05); }
    .upload-area img { max-width: 100%; max-height: 400px; border-radius: 14px; display: none; }
    .upload-text { font-size: 18px; color: var(--text-sub); }

    .main-btn {
      width: 100%; background: var(--btn-bg); color: var(--btn-text);
      border: none; border-radius: 14px; padding: 16px; font-size: 18px;
      font-weight: bold; cursor: pointer; transition: transform 0.15s;
    }
    .main-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .main-btn:hover:not(:disabled) { transform: translateY(-2px); }

    .result-area {
      margin-top: 32px; padding: 24px; background: var(--analysis-bg);
      border-radius: 18px; display: none; animation: fadeIn 0.5s;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .score-circle {
      width: 120px; height: 120px; border-radius: 50%; border: 8px solid var(--btn-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: bold; margin: 0 auto 20px;
    }
    .result-msg { font-size: 20px; font-weight: bold; margin-bottom: 12px; }
    .result-desc { line-height: 1.7; color: var(--text-sub); }

    .loading { display: none; margin: 20px 0; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--btn-bg); border-radius: 50%;
      animation: spin 1s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #file-input { display: none; }
  </style>
</head>
<body data-theme="dark">
  <div class="wrap">
    <div class="controls">
      <button class="control-btn" id="lang-toggle" onclick="toggleLanguage()">English</button>
      <button class="control-btn" id="theme-toggle" onclick="toggleTheme()">☀️ Light Mode</button>
    </div>

    <div class="card">
      <h1 id="title">반려동물 궁합 테스트</h1>
      <p class="sub" id="subtitle">반려동물과 주인이 얼마나 닮았을까요?<br>함께 찍은 사진을 업로드하여 인공지능 궁합을 확인해보세요!</p>

      <div class="upload-area" onclick="document.getElementById('file-input').click()" id="drop-zone">
        <div id="upload-prompt">
          <p class="upload-text" id="upload-text-1">📸 클릭하거나 사진을 드래그하세요</p>
          <p style="font-size: 14px; color: var(--text-sub);" id="upload-text-2">(반려동물과 사람이 함께 나온 사진이 좋습니다)</p>
        </div>
        <img id="image-preview" src="" alt="Preview" />
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="handleImageUpload(event)" />

      <button class="main-btn" id="test-btn" onclick="startAnalysis()" disabled>궁합 분석하기</button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p id="loading-text">인공지능이 닮은꼴을 분석 중입니다...</p>
      </div>

      <div class="result-area" id="result-area">
        <div class="score-circle" id="result-score">0%</div>
        <div class="result-msg" id="result-message">분석 결과</div>
        <div class="result-desc" id="result-description"></div>
      </div>
    </div>
  </div>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/tuwT6CF0Y/";
    let model, maxPredictions;
    let currentLang = 'ko';

    const i18n = {
      ko: {
        title: "반려동물 궁합 테스트",
        subtitle: "반려동물과 주인이 얼마나 닮았을까요?<br>함께 찍은 사진을 업로드하여 인공지능 궁합을 확인해보세요!",
        upload1: "📸 클릭하거나 사진을 드래그하세요",
        upload2: "(반려동물과 사람이 함께 나온 사진이 좋습니다)",
        testBtn: "궁합 분석하기",
        loading: "인공지능이 닮은꼴을 분석 중입니다...",
        resultTitle: "분석 결과",
        msgs: {
          high: "환상의 짝꿍! 찰떡궁합 💖",
          mid: "분위기가 묘하게 닮았네요! 😊",
          low: "서로 다른 매력이 돋보여요! ✨"
        },
        descs: {
          high: "얼굴형과 표정에서 깊은 유대감이 느껴집니다. 전생에 한 가족이었을지도 몰라요!",
          mid: "서로를 닮아가는 과정인가요? 함께한 시간이 길수록 더 닮아갈 거예요.",
          low: "닮은 점보다는 서로를 보완해주는 특별한 조화가 느껴지는 궁합입니다."
        }
      },
      en: {
        title: "Pet Compatibility Test",
        subtitle: "How much do you and your pet look alike?<br>Upload a photo to see your AI-powered match score!",
        upload1: "📸 Click or drag a photo here",
        upload2: "(Photos with both pet and human work best)",
        testBtn: "Start Analysis",
        loading: "AI is analyzing your resemblance...",
        resultTitle: "Analysis Result",
        msgs: {
          high: "Soulmates! Perfect Match 💖",
          mid: "You have a similar vibe! 😊",
          low: "Unique charms in harmony! ✨"
        },
        descs: {
          high: "There's a deep connection in your expressions. You might have been family in a past life!",
          mid: "Are you starting to look alike? The more time you spend together, the more you'll match.",
          low: "It's a special harmony that complements each other's unique features."
        }
      }
    };

    async function loadModel() {
      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";
      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();
    }

    function toggleLanguage() {
      currentLang = currentLang === 'ko' ? 'en' : 'ko';
      document.getElementById("lang-toggle").textContent = currentLang === 'ko' ? 'English' : '한국어';
      updateUI();
    }

    function updateUI() {
      const t = i18n[currentLang];
      document.getElementById("title-tag").textContent = t.title;
      document.getElementById("title").textContent = t.title;
      document.getElementById("subtitle").innerHTML = t.subtitle;
      document.getElementById("upload-text-1").textContent = t.upload1;
      document.getElementById("upload-text-2").textContent = t.upload2;
      document.getElementById("test-btn").textContent = t.testBtn;
      document.getElementById("loading-text").textContent = t.loading;
      document.getElementById("result-area").style.display = "none";
    }

    function toggleTheme() {
      const body = document.body;
      const btn = document.getElementById("theme-toggle");
      if (body.getAttribute("data-theme") === "dark") {
        body.setAttribute("data-theme", "light");
        btn.textContent = "🌙 Dark Mode";
      } else {
        body.setAttribute("data-theme", "dark");
        btn.textContent = "☀️ Light Mode";
      }
    }

    function handleImageUpload(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.getElementById("image-preview");
          img.src = e.target.result;
          img.style.display = "block";
          document.getElementById("upload-prompt").style.display = "none";
          document.getElementById("test-btn").disabled = false;
          document.getElementById("result-area").style.display = "none";
        };
        reader.readAsDataURL(file);
      }
    }

    async function startAnalysis() {
      const img = document.getElementById("image-preview");
      const btn = document.getElementById("test-btn");
      const loading = document.getElementById("loading");
      const resultArea = document.getElementById("result-area");

      btn.disabled = true;
      loading.style.display = "block";
      resultArea.style.display = "none";

      if (!model) await loadModel();

      const prediction = await model.predict(img);
      
      // 닮은꼴 비율 계산 (가장 높은 확률 클래스를 기준으로 점수화)
      // Teachable Machine 클래스 구성을 알 수 없으므로, 상위 클래스의 확률을 점수로 활용
      let topScore = 0;
      prediction.forEach(p => { if(p.probability > topScore) topScore = p.probability; });
      
      const score = Math.round(topScore * 100);
      displayResult(score);

      loading.style.display = "none";
      btn.disabled = false;
    }

    function displayResult(score) {
      const t = i18n[currentLang];
      const resultArea = document.getElementById("result-area");
      const scoreCircle = document.getElementById("result-score");
      const msg = document.getElementById("result-message");
      const desc = document.getElementById("result-description");

      resultArea.style.display = "block";
      scoreCircle.textContent = score + "%";

      if (score >= 80) {
        msg.textContent = t.msgs.high;
        desc.textContent = t.descs.high;
      } else if (score >= 40) {
        msg.textContent = t.msgs.mid;
        desc.textContent = t.descs.mid;
      } else {
        msg.textContent = t.msgs.low;
        desc.textContent = t.descs.low;
      }
    }

    // Drag and Drop
    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--btn-bg)'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'var(--text-sub)'; });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        document.getElementById('file-input').files = files;
        handleImageUpload({ target: { files: files } });
      }
    });

    window.onload = updateUI;
  </script>
</body>
</html>
